<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal — 20,000+ live radio stations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#05060B;
    --bg-2:#0A0D18;
    --panel:rgba(255,255,255,0.045);
    --panel-2:rgba(255,255,255,0.075);
    --glass-border:rgba(255,255,255,0.10);
    --glass-border-strong:rgba(255,255,255,0.20);
    --amber:#FFB454;
    --amber-dim:#8A5F26;
    --teal:#2DD4BF;
    --violet:#8B7CFF;
    --rose:#FF6F97;
    --text:#F5F3ED;
    --muted:#8A90A6;
    --line:rgba(255,255,255,0.09);
    --danger:#FF6B6B;
    --radius:18px;
    --radius-sm:12px;
    --shadow-glass:0 8px 32px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Space Grotesk', sans-serif;
    min-height:100%;
    padding-bottom:112px;
    position:relative;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }
  .mono{font-family:'JetBrains Mono', monospace;}
  .display{font-family:'Sora', 'Space Grotesk', sans-serif;}
  a,button{font-family:inherit; color:inherit;}
  button{cursor:pointer; border:none; background:none;}
  button:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible{
    outline:2px solid var(--teal); outline-offset:2px;
  }
  ::selection{background:var(--amber); color:#1a1200;}

  /* ============ Ambient background system ============ */
  .aurora-bg{
    position:fixed; inset:0; z-index:-2; overflow:hidden; background:var(--bg);
  }
  .aurora-bg::after{
    content:''; position:absolute; inset:0;
    background:
      radial-gradient(ellipse 1000px 600px at 8% -8%, rgba(255,180,84,0.10), transparent 60%),
      radial-gradient(ellipse 900px 700px at 100% 0%, rgba(45,212,191,0.09), transparent 60%),
      radial-gradient(ellipse 1200px 900px at 50% 120%, rgba(139,124,255,0.08), transparent 60%);
  }
  .aurora{
    position:absolute; border-radius:50%; filter:blur(90px); opacity:0.55; mix-blend-mode:screen;
    will-change:transform;
  }
  .aurora.a1{
    width:640px; height:640px; top:-220px; left:-160px;
    background:radial-gradient(circle, rgba(255,180,84,0.55), transparent 70%);
    animation:auroraDrift1 26s ease-in-out infinite;
  }
  .aurora.a2{
    width:560px; height:560px; top:-120px; right:-180px;
    background:radial-gradient(circle, rgba(45,212,191,0.5), transparent 70%);
    animation:auroraDrift2 32s ease-in-out infinite;
  }
  .aurora.a3{
    width:700px; height:700px; bottom:-320px; left:30%;
    background:radial-gradient(circle, rgba(139,124,255,0.45), transparent 70%);
    animation:auroraDrift3 38s ease-in-out infinite;
  }
  @keyframes auroraDrift1{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(60px,40px) scale(1.12);}
  }
  @keyframes auroraDrift2{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(-70px,50px) scale(1.08);}
  }
  @keyframes auroraDrift3{
    0%,100%{transform:translate(-50%,0) scale(1);}
    50%{transform:translate(-50%,-40px) scale(1.15);}
  }
  #particles-canvas{
    position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:0.5;
  }
  .grain{
    position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:0.035; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .vignette{
    position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:radial-gradient(ellipse 1400px 1000px at 50% 40%, transparent 55%, rgba(0,0,0,0.55));
  }

  /* ============ Loading screen ============ */
  #loading-screen{
    position:fixed; inset:0; z-index:9999; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
    transition:opacity .7s ease, visibility .7s ease;
  }
  #loading-screen.done{opacity:0; visibility:hidden; pointer-events:none;}
  .loading-core{position:relative; width:120px; height:120px; display:flex; align-items:center; justify-content:center;}
  .loading-core .ring{
    position:absolute; border-radius:50%; border:1px solid var(--glass-border-strong);
  }
  .loading-core .r1{width:120px; height:120px; animation:loadSpin 3s linear infinite;}
  .loading-core .r2{width:88px; height:88px; border-color:rgba(255,180,84,0.35); animation:loadSpin 2.2s linear infinite reverse;}
  .loading-core .r3{width:56px; height:56px; border-color:rgba(45,212,191,0.4); animation:loadSpin 1.6s linear infinite;}
  @keyframes loadSpin{to{transform:rotate(360deg);}}
  .loading-mark{
    width:16px; height:16px; border-radius:50%; background:var(--amber);
    box-shadow:0 0 24px rgba(255,180,84,0.9), 0 0 60px rgba(255,180,84,0.5);
    animation:corePulse 1.6s ease-in-out infinite;
  }
  @keyframes corePulse{0%,100%{transform:scale(1); opacity:1;} 50%{transform:scale(1.35); opacity:0.7;}}
  .loading-word{font-family:'Sora', sans-serif; font-size:22px; font-weight:700; letter-spacing:0.14em;}
  .loading-word span{color:var(--amber);}
  .loading-sub{font-size:12px; color:var(--muted); letter-spacing:0.06em;}

  /* ============ Header ============ */
  header.topbar{
    display:flex; align-items:center; gap:20px;
    padding:20px clamp(16px,4vw,40px) 14px;
    flex-wrap:wrap;
    position:sticky; top:0; z-index:40;
  }
  header.topbar::before{
    content:''; position:absolute; inset:0 0 0 0; height:100%;
    backdrop-filter:blur(18px) saturate(160%); -webkit-backdrop-filter:blur(18px) saturate(160%);
    background:linear-gradient(180deg, rgba(6,8,14,0.72), rgba(6,8,14,0.35));
    border-bottom:1px solid var(--glass-border);
    z-index:-1;
  }
  .logo{display:flex; align-items:center; gap:10px;}
  .logo .mark{
    width:36px; height:36px; border-radius:50%;
    border:1.5px solid var(--amber);
    display:flex; align-items:center; justify-content:center;
    position:relative;
    box-shadow:0 0 18px rgba(255,180,84,0.4), inset 0 0 12px rgba(255,180,84,0.15);
    animation:logoBreathe 3.4s ease-in-out infinite;
  }
  @keyframes logoBreathe{0%,100%{box-shadow:0 0 18px rgba(255,180,84,0.4), inset 0 0 12px rgba(255,180,84,0.15);} 50%{box-shadow:0 0 26px rgba(255,180,84,0.65), inset 0 0 16px rgba(255,180,84,0.25);}}
  .logo .mark::before{
    content:''; width:8px; height:8px; border-radius:50%;
    background:var(--amber); box-shadow:0 0 8px var(--amber);
  }
  .logo .wordmark{font-family:'Sora', sans-serif; font-size:19px; font-weight:700; letter-spacing:0.08em;}
  .logo .wordmark span{color:var(--amber);}
  .search-wrap{
    flex:1 1 320px; min-width:220px;
    display:flex; align-items:center; gap:10px;
    background:var(--panel); border:1px solid var(--glass-border);
    backdrop-filter:blur(12px);
    border-radius:999px; padding:11px 20px;
    transition:border-color .2s ease, background .2s ease;
  }
  .search-wrap:focus-within{border-color:rgba(255,180,84,0.5); background:var(--panel-2);}
  .search-wrap svg{flex-shrink:0; opacity:0.55;}
  .search-wrap input{
    flex:1; background:none; border:none; color:var(--text);
    font-family:'JetBrains Mono', monospace; font-size:14px;
  }
  .search-wrap input::placeholder{color:var(--muted);}
  .stats-readout{
    text-align:right; font-family:'JetBrains Mono', monospace;
    font-size:12px; color:var(--muted); line-height:1.5; white-space:nowrap;
  }
  .stats-readout b{color:var(--teal); font-weight:600;}

  /* ============ Jam ============ */
  .jam-btn{
    padding:9px 15px; border-radius:999px; border:1px solid var(--glass-border);
    background:var(--panel); backdrop-filter:blur(10px);
    font-family:'JetBrains Mono', monospace; font-size:12px;
    color:var(--muted); display:flex; align-items:center; gap:7px; flex-shrink:0;
    transition:all .2s ease;
  }
  .jam-btn:hover{color:var(--text); border-color:var(--glass-border-strong);}
  .jam-btn.active{border-color:var(--teal); color:var(--teal); box-shadow:0 0 16px rgba(45,212,191,0.3);}
  .jam-btn .pulse-dot{width:6px; height:6px; border-radius:50%; background:var(--teal); box-shadow:0 0 6px var(--teal); display:none;}
  .jam-btn.active .pulse-dot{display:block; animation:pulseDot 1.4s ease-in-out infinite;}
  @keyframes pulseDot{0%,100%{opacity:1;} 50%{opacity:0.25;}}

  .jam-panel{
    padding:0 clamp(16px,4vw,40px); background:rgba(10,13,24,0.6); backdrop-filter:blur(18px);
    border-top:1px solid var(--glass-border); border-bottom:1px solid var(--glass-border);
    max-height:0; overflow:hidden; transition:max-height .35s cubic-bezier(.4,0,.2,1), padding .35s ease;
  }
  .jam-panel.open{ padding:20px clamp(16px,4vw,40px); max-height:420px; }
  .jam-row{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:12px;}
  .jam-row:last-child{margin-bottom:0;}
  .jam-input{
    background:var(--panel-2); border:1px solid var(--glass-border); border-radius:9px;
    padding:10px 12px; font-family:'JetBrains Mono', monospace; font-size:13px; color:var(--text);
    width:110px; text-transform:uppercase; letter-spacing:0.08em;
  }
  .jam-input:focus{border-color:var(--teal);}
  .jam-code-display{font-family:'JetBrains Mono', monospace; font-size:28px; font-weight:600; letter-spacing:0.14em; color:var(--teal); text-shadow:0 0 20px rgba(45,212,191,0.5);}
  .jam-btn-solid{background:linear-gradient(135deg, var(--teal), #1fae9c); color:#03211d; font-weight:600; font-size:12px; padding:10px 18px; border-radius:9px; box-shadow:0 4px 18px rgba(45,212,191,0.25);}
  .jam-btn-solid:hover{filter:brightness(1.12); transform:translateY(-1px);}
  .jam-btn-outline{border:1px solid var(--glass-border); color:var(--text); font-size:12px; padding:10px 18px; border-radius:9px; background:rgba(255,255,255,0.02);}
  #signin-btn{padding:8px 14px; font-size:11px;}
  #signin-btn:disabled{color:var(--teal); border-color:var(--teal); opacity:0.8; cursor:default;}
  .jam-btn-outline:hover{border-color:var(--danger); color:var(--danger);}
  .jam-btn-outline.safe:hover{border-color:var(--teal); color:var(--teal);}
  .jam-desc{font-size:11px; color:var(--muted); max-width:480px; line-height:1.5;}
  .jam-listeners{font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--muted);}
  .jam-listeners b{color:var(--teal);}
  .jam-divider{width:1px; height:26px; background:var(--glass-border);}

  /* --- Live signal globe (jam visual) --- */
  .jam-globe-wrap{
    display:flex; align-items:center; gap:18px; margin-top:4px; padding-top:14px;
    border-top:1px dashed var(--glass-border); flex-wrap:wrap;
  }
  .jam-globe{
    position:relative; width:84px; height:84px; border-radius:50%; flex-shrink:0;
    background:radial-gradient(circle at 32% 28%, rgba(45,212,191,0.25), rgba(10,13,24,0.6) 70%);
    border:1px solid var(--glass-border-strong);
    box-shadow:0 0 24px rgba(45,212,191,0.15), inset 0 0 20px rgba(0,0,0,0.4);
    overflow:hidden;
  }
  .jam-globe::before, .jam-globe::after{
    content:''; position:absolute; border:1px solid rgba(255,255,255,0.09); border-radius:50%;
  }
  .jam-globe::before{inset:14% 0; animation:globeSpin 9s linear infinite;}
  .jam-globe::after{inset:0 24%; animation:globeSpin 7s linear infinite reverse;}
  @keyframes globeSpin{from{transform:rotateX(70deg) rotate(0deg);} to{transform:rotateX(70deg) rotate(360deg);}}
  .globe-pulses{position:absolute; inset:0;}
  .signal-pulse{
    position:absolute; width:6px; height:6px; margin:-3px 0 0 -3px; border-radius:50%;
    background:var(--teal); box-shadow:0 0 6px var(--teal);
    animation:signalPing 2.2s ease-out infinite;
  }
  .signal-pulse::after{
    content:''; position:absolute; inset:-6px; border-radius:50%; border:1px solid var(--teal);
    animation:signalRipple 2.2s ease-out infinite;
  }
  @keyframes signalPing{0%,100%{opacity:0.5;} 50%{opacity:1;}}
  @keyframes signalRipple{0%{transform:scale(0.3); opacity:0.8;} 100%{transform:scale(2.6); opacity:0;}}
  .jam-globe-caption{font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--muted); line-height:1.6;}
  .jam-globe-caption b{color:var(--text); font-weight:600;}

  /* ============ Orbit hero (signature element) ============ */
  .orbit-section{padding:10px clamp(16px,4vw,40px) 4px; display:flex; justify-content:center;}
  .orbit-stage{
    position:relative; width:100%; max-width:640px; height:230px;
    display:flex; align-items:center; justify-content:center;
    --orbit-speed:26s;
  }
  .orbit-globe{
    position:absolute; width:150px; height:150px; border-radius:50%;
    background:radial-gradient(circle at 34% 30%, rgba(139,124,255,0.16), rgba(6,8,14,0.5) 68%);
    border:1px solid var(--glass-border);
    box-shadow:0 0 50px rgba(139,124,255,0.12), inset 0 0 30px rgba(0,0,0,0.5);
  }
  .orbit-globe::before{
    content:''; position:absolute; inset:10%; border-radius:50%;
    border:1px dashed rgba(255,255,255,0.10);
    animation:loadSpin 40s linear infinite;
  }
  .orbit-globe::after{
    content:''; position:absolute; inset:0; border-radius:50%;
    background:repeating-linear-gradient(0deg, transparent 0 8px, rgba(255,255,255,0.025) 8px 9px);
    -webkit-mask-image:radial-gradient(circle, black 60%, transparent 100%);
    mask-image:radial-gradient(circle, black 60%, transparent 100%);
  }
  .orbit-ring{
    position:absolute; border-radius:50%; border:1px solid var(--glass-border);
  }
  .orbit-ring.outer{width:340px; height:340px; animation:loadSpin 90s linear infinite;}
  .orbit-ring.inner{width:230px; height:230px; border-style:dashed; opacity:0.5; animation:loadSpin 60s linear infinite reverse;}
  .orbit-core{
    position:absolute; width:14px; height:14px; border-radius:50%; background:var(--amber);
    box-shadow:0 0 20px rgba(255,180,84,0.9), 0 0 50px rgba(255,180,84,0.4);
    animation:corePulse 2.4s ease-in-out infinite;
    transition:box-shadow .4s ease;
  }
  .orbit-stage.is-playing .orbit-core{
    box-shadow:0 0 28px rgba(255,180,84,1), 0 0 80px rgba(255,180,84,0.6);
  }
  .orbit-stage.is-playing{--orbit-speed:11s;}
  .orbit-path-outer{
    position:absolute; inset:0;
    animation:orbitRotate var(--orbit-speed) linear infinite;
    transition:animation-duration .6s ease;
  }
  @keyframes orbitRotate{to{transform:rotate(360deg);}}
  .orbit-card-wrap{
    position:absolute; top:-4px; left:50%; transform:translateX(-50%);
    animation:orbitCounter var(--orbit-speed) linear infinite;
    transition:animation-duration .6s ease;
  }
  @keyframes orbitCounter{to{transform:translateX(-50%) rotate(-360deg);}}
  .orbit-card{
    display:flex; align-items:center; gap:10px;
    background:var(--panel); border:1px solid var(--glass-border-strong);
    backdrop-filter:blur(16px) saturate(160%);
    border-radius:16px; padding:9px 16px 9px 9px;
    box-shadow:var(--shadow-glass);
    min-width:190px;
    transition:box-shadow .4s ease, border-color .4s ease;
  }
  .orbit-stage.is-playing .orbit-card{
    border-color:rgba(45,212,191,0.5); box-shadow:0 0 30px rgba(45,212,191,0.25), var(--shadow-glass);
  }
  .orbit-cover{
    width:38px; height:38px; border-radius:10px; flex-shrink:0; overflow:hidden; position:relative;
    background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
  }
  .orbit-cover img{width:100%; height:100%; object-fit:cover; position:absolute; inset:0;}
  .orbit-eyebrow{font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted);}
  .orbit-name{font-size:13px; font-weight:600; max-width:130px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  @media (max-width:640px){
    .orbit-stage{height:190px; transform:scale(0.82);}
  }

  /* ---- Orbit satellites: multiple small floating station cards on the ring ---- */
  .orbit-satellites{position:absolute; inset:0; animation:orbitRotate 42s linear infinite; transition:animation-duration .6s ease;}
  .orbit-stage.is-playing .orbit-satellites{animation-duration:19s;}
  .orbit-sat{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(var(--a,0deg)) translateX(var(--r,150px));}
  .orbit-sat-counter{animation:orbitCounter 42s linear infinite; transition:animation-duration .6s ease;}
  .orbit-stage.is-playing .orbit-sat-counter{animation-duration:19s;}
  .orbit-mini-card{
    width:40px; height:40px; border-radius:12px; padding:0; border:1px solid var(--glass-border);
    background:var(--panel); backdrop-filter:blur(14px) saturate(160%); overflow:hidden; position:relative;
    box-shadow:var(--shadow-glass); transition:transform .25s ease, border-color .3s ease, box-shadow .3s ease;
  }
  .orbit-mini-card:hover{transform:scale(1.18); border-color:var(--glass-border-strong);}
  .orbit-mini-card.playing{border-color:var(--teal); box-shadow:0 0 18px rgba(45,212,191,0.45);}
  .orbit-mini-cover{position:absolute; inset:0; display:block;}
  .orbit-mini-cover img{width:100%; height:100%; object-fit:cover; position:absolute; inset:0;}
  @media (max-width:640px){
    .orbit-sat{transform:translate(-50%,-50%) rotate(var(--a,0deg)) translateX(calc(var(--r,150px) * 0.78));}
    .orbit-mini-card{width:32px; height:32px; border-radius:9px;}
  }

  /* ============ Dial ============ */
  .dial-section{padding:14px clamp(16px,4vw,40px) 8px;}
  .dial-header{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom:10px; flex-wrap:wrap; gap:6px;
  }
  .dial-header h2{font-family:'Sora',sans-serif; font-size:12px; letter-spacing:0.16em; text-transform:uppercase; color:var(--muted); font-weight:700;}
  .lcd{
    font-family:'JetBrains Mono', monospace; font-size:13px;
    color:var(--teal); display:flex; align-items:center; gap:10px;
  }
  .lcd .freq{font-size:16px; font-weight:600; text-shadow:0 0 12px rgba(45,212,191,0.5);}
  .lcd .name{color:var(--text); max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .tune-btn{
    background:linear-gradient(135deg, var(--teal), #1fae9c); color:#03211d; font-weight:600; font-size:12px;
    padding:6px 14px; border-radius:999px; letter-spacing:0.03em;
    transition:transform .15s ease, box-shadow .15s ease;
    box-shadow:0 4px 16px rgba(45,212,191,0.2);
  }
  .tune-btn:hover{transform:scale(1.06);}
  .tune-btn:disabled{opacity:0.35; cursor:default;}

  .dial-frame{
    position:relative; height:112px; border-radius:var(--radius);
    background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015));
    backdrop-filter:blur(20px) saturate(160%);
    border:1px solid var(--glass-border-strong);
    box-shadow:var(--shadow-glass);
    overflow:hidden;
  }
  .dial-viewport{
    position:absolute; inset:0; overflow-x:auto; overflow-y:hidden;
    scrollbar-width:none;
    display:flex; align-items:flex-end;
  }
  .dial-viewport::-webkit-scrollbar{display:none;}
  .dial-strip{
    position:relative; height:100%; flex-shrink:0;
    background-image:
      repeating-linear-gradient(90deg, var(--line) 0 1px, transparent 1px 40px);
  }
  .tic
